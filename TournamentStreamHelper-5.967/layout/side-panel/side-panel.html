<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="../include/globals.js"></script>
    <link rel="stylesheet" href="../main.css" />
    <link rel="stylesheet" href="../theme.css" />
    <link rel="stylesheet" href="./side-panel.css" />
  </head>
  <body>

    <!-- ── Cam overlay: rounded corners + edge blend (transparent center) ── -->
    <div class="cam-overlay"></div>

    <!-- ── Green surface bands framing the transparent cam cutout ── -->
    <!-- In OBS: body background is transparent. These four divs    -->
    <!-- provide the forest green frame; the cam region between them -->
    <!-- has no elements → transparent pixels → OBS cam shows through -->
    <div class="bg-top"></div>
    <div class="bg-bottom"></div>
    <div class="bg-left"></div>
    <div class="bg-right"></div>

    <!-- ── Header card: tournament name ──────────────────────────── -->
    <div class="header-card">
      <span class="tournament-name"></span>
    </div>

    <!-- ── Bottom slot card: logo + #3 player card placeholder ───── -->
    <div class="bottom-card">
      <!-- Atmospheric depth layers (behind everything) -->
      <div class="slot-light"></div>
      <div class="slot-grain"></div>
      <div class="slot-vignette"></div>

      <!-- Ambient animation orbs -->
      <div class="ambient ambient-1"></div>
      <div class="ambient ambient-2"></div>
      <div class="ambient ambient-3"></div>
      <div class="ambient ambient-4"></div>
      <div class="ambient ambient-5"></div>

      <!-- Logo cycle: tournament logo ↔ sponsor logo -->
      <div class="slot-logo">
        <div class="logo-stage">
          <img class="logo-img logo-primary" src="" alt="" />
          <img class="logo-img logo-sponsor" src="" alt="" />
        </div>
      </div>

      <!-- ── Rotating info panels (issue #3) ──────────────────── -->
      <div class="panel-slot-content">

        <!-- Player 1 Card -->
        <div class="info-panel" id="panel-player-1">
          <div class="player-identity">
            <div class="player-tag"></div>
            <div class="player-char-name"></div>
          </div>
          <div class="panel-header">Current Run</div>
          <div class="run-list"></div>
          <div class="panel-header">Recent Results</div>
          <div class="history-list"></div>
        </div>

        <!-- Player 2 Card -->
        <div class="info-panel" id="panel-player-2">
          <div class="player-identity">
            <div class="player-tag"></div>
            <div class="player-char-name"></div>
          </div>
          <div class="panel-header">Current Run</div>
          <div class="run-list"></div>
          <div class="panel-header">Recent Results</div>
          <div class="history-list"></div>
        </div>

        <!-- Recent Sets (featured players) -->
        <div class="info-panel" id="panel-recent-sets">
          <div class="panel-header">Recent Sets</div>
          <div class="sets-list"></div>
        </div>

        <!-- Completed Sets (whole tournament) -->
        <div class="info-panel" id="panel-completed-sets">
          <div class="panel-header">Just Finished</div>
          <div class="completed-list"></div>
        </div>

        <!-- Stream Queue -->
        <div class="info-panel" id="panel-queue">
          <div class="panel-header">Up Next</div>
          <div class="queue-list"></div>
        </div>

      </div>
    </div>

    <!-- Slippi Bridge (conditional load) -->
    <script>
      (function () {
        var s = document.createElement("script");
        s.src = "http://localhost:5001/socket.io/socket.io.js";
        document.head.appendChild(s);
      })();
    </script>
    <script src="side-panel.js"></script>
  </body>
</html>
